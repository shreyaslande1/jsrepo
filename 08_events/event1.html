<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>chai aur shreyas</h1>
    <button id="stop">stop</button>
</body>
<script>
    setTimeout(() => {
        console.log("my name is shreyas")
    }, 2000);
    let changename = 
        setTimeout(()=>{
            document.querySelector("h1").innerText = "my name is shreyas"
    },2000)
    
    
    document.getElementById("stop").addEventListener('click', function(e){
        clearTimeout(changename)
    })
</script>
</html>

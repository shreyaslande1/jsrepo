<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>chai aur shreyas</h1>
    <button id="stop">stop</button>
</body>
<script>
    setTimeout(function(){
        console.log("sheyash print after 3 seconds");
        
    },3000)
  
    
    const sayshreyas = function(){
        console.log("shreyas")
    }
    setTimeout(sayshreyas,3000)
    
  
    
    const changetext = function(){
        document.querySelector('h1').innerText = "my name is shreyas";
    }
    const stopped = setTimeout(changetext,4000)


    document.querySelector('#stop').addEventListener('click', function(){
        clearTimeout(stopped)
        console.log("sayshreyas stopped")
    })
</script>
</html>
